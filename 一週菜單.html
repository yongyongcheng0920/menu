const FAVE_FRUITS = ["柳橙","小蕃茄","無籽葡萄","蘋果","奇異果"];
const getFruits = () => {
  const m=new Date().getMonth()+1, prev=m===1?12:m-1, next=m===12?1:m+1;
  const peak=new Set(FRUITS_BY_MONTH[m]||[]);
  const all=new Set([...(FRUITS_BY_MONTH[prev]||[]),...(FRUITS_BY_MONTH[m]||[]),...(FRUITS_BY_MONTH[next]||[])]);
  return [...all].map(f=>({name:f,peak:peak.has(f),fav:FAVE_FRUITS.includes(f)}));
};

  D:{label:"D班",time:"07:30–16:30",color:"#f5ece4",together:true,portions:4,desc:"愛迪生17:30到家可備料，一起煮4人份"},
  C:{label:"C班",time:"11:00–20:00",color:"#f5f0e4",together:false,portions:3,desc:"Ginny自己煮3人份，愛迪生21:00到家洗碗"},
  F:{label:"F班",time:"14:00–23:00",color:"#e8eef5",together:false,portions:3,desc:"愛迪生13:00前備料，Ginny晚上煮3人份"},

const PANTRY0 = ["鹽","糖","醬油","烏醋","米酒","豆瓣醬","紅蔥醬","胡椒粉","香油","辣椒醬","蒜頭","薑","蔥","番茄醬","味噌","太白粉","麻油"];

const pad=n=>String(n).padStart(2,"0");
const fmtD=d=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const WD=["日","一","二","三","四","五","六"];
const CN=["一","二","三","四","五","六","七"];
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const getMon=()=>{const t=new Date();t.setHours(0,0,0,0);const df=t.getDay()===0?-6:1-t.getDay();t.setDate(t.getDate()+df);return t;};
const getHol=d=>HOL[fmtD(d)];
const isWknd=d=>d.getDay()===0||d.getDay()===6;
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
const shuffle=arr=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const C={bg:"#f7f3ee",card:"#fffefa",border:"#e8e0d5",accent:"#a07c6a",accentBg:"#f2ebe4",text:"#3a2e27",muted:"#9c8e84",green:"#7a9e7e",greenBg:"#eef4ee",red:"#b05a52"};

// ═══════════════════════════════════════════════════════════════
// 以食材為主導的菜單生成
// ═══════════════════════════════════════════════════════════════
function buildMenu(ings, sched, recentSet, pantry) {
  // 使用者食材（依保鮮期排序，快過期優先）
  const userIngs = [...ings].sort((a,b)=>a.days-b.days).map(i=>i.name);

  // 一道菜「用到幾樣使用者食材」
  const usesIng = (dishName) => {
    const keys = DB[dishName].keys;
    let count = 0, firstIdx = 99;
    userIngs.forEach((ing, idx) => {
      if (keys.some(k => ing.includes(k) || k.includes(ing))) {
        count++; firstIdx = Math.min(firstIdx, idx);
      }
    });
    return { count, firstIdx };
  };

  // 基本補菜（食材不足時用）：炒青菜、燙青菜、煎蛋類，這些幾乎家裡都有
  const BASIC = ["炒高麗菜","蔥花蛋","蒸蛋","炒青江菜","燙花椰菜","清炒豆芽","紅蘿蔔炒蛋"];

  // 依「是否用到食材 + 難度符合 + 未重複」挑菜
  // matchLevel: 想要的難度集合
  const buildPool = (types, allowDiff) => {
    const all = types.flatMap(t=>byType(t));
    return all
      .map(n => ({ n, ...usesIng(n), recent:recentSet.has(n), diff:DB[n].diff }))
      .filter(x => allowDiff.includes(x.diff))
      .sort((a,b)=>{
        // 1. 有用到食材的優先
        if ((a.count>0) !== (b.count>0)) return a.count>0 ? -1 : 1;
        // 2. 沒吃過的優先
        if (a.recent !== b.recent) return a.recent ? 1 : -1;
        // 3. 用到越多食材、食材越快過期越優先
        if (b.count !== a.count) return b.count - a.count;
        return a.firstIdx - b.firstIdx;
      });
  };

  const used = new Set();
  // 從候選池挑一道「有用到食材」的菜；若沒有，回傳 null（表示要補基本菜）
  const pickReal = (pool) => {
    for (const x of pool){ if(!used.has(x.n) && x.count>0){ used.add(x.n); return x.n; } }
    return null;
  };
  const pickBasic = (allowDiff) => {
    const cands = BASIC.filter(b=>DB[b] && allowDiff.includes(DB[b].diff) && !used.has(b));
    const c = cands.length ? cands[0] : pick(BASIC);
    used.add(c); return c;
  };

  const days = [];
  let prevDinner = null;
  for (let i=0;i<7;i++){
    const sh = SHIFTS[sched[i].shift];
    const me = sched[i].me;
    // ── 難度判定 ──
    // 兩人都沒空（愛迪生F/N不在 或 休假但你很忙；你"很忙"）→ 只出簡易(1)
    // 兩人都有空（一起吃 且 你有空）→ 可出較複雜(含3)
    // 其餘 → 簡易+普通(1,2)
    let allowDiff;
    const ginnyBusy = me === "很忙";
    const together = sh.together;
    if (ginnyBusy) allowDiff = [1];                    // 你很忙 → 只簡易
    else if (together && me === "有空") allowDiff = [1,2,3]; // 都有空 → 可複雜
    else allowDiff = [1,2];                             // 普通情況

    let dinner, dishNames=[];
    // 嘗試安排一鍋類（若有用到食材且難度符合）
    const onePool = buildPool(["one"], allowDiff);
    const oneHit = onePool.find(x=>x.count>0 && !used.has(x.n));
    const wantOne = oneHit && (i%3===2); // 每隔幾天來個一鍋類

    if (wantOne) {
      used.add(oneHit.n);
      const bPool = buildPool(["blanch"], [1]);
      const veg = pickReal(bPool) || pickBasic([1]);
      dinner = oneHit.n + "＋" + veg;
      dishNames = [oneHit.n, veg];
    } else {
      const mainPool = buildPool(["main","egg"], allowDiff);
      const vegPool = buildPool(["veg","blanch"], allowDiff.includes(1)?[1,2]:allowDiff);
      const main = pickReal(mainPool) || pickBasic(allowDiff);
      const veg = pickReal(vegPool) || pickBasic([1]);
      dinner = "白飯＋" + main + "＋" + veg;
      dishNames = [main, veg];
    }
    // 計算當天最高難度
    const maxDiff = Math.max(...dishNames.map(n=>(DB[n]&&DB[n].diff)||1));
    // 計算需補買的食材：菜的 keys 裡，使用者沒有、也不是常備調味料的
    const pantryList = pantry || [];
    const commonStuff = ["肉","蛋","蔥","蒜","薑","飯"]; // 太通用的不標(蛋蔥蒜薑通常有)
    // 同義詞正規化（避免重複列出花椰菜/青花菜等）
    const SYN = {"白花椰":"花椰菜","青花菜":"花椰菜","綠花椰":"花椰菜","蕃茄":"番茄","五花":"五花肉","肉片":"豬肉","肉絲":"豬肉"};
    const norm = k => SYN[k] || k;
    const missingSet = new Set();
    dishNames.forEach(n=>{
      if(!DB[n]) return;
      DB[n].keys.forEach(k=>{
        const hasIt = userIngs.some(ing=>ing.includes(k)||k.includes(ing));
        const isPantry = pantryList.some(p=>p.includes(k)||k.includes(p));
        const isCommon = commonStuff.includes(k);
        if(!hasIt && !isPantry && !isCommon) missingSet.add(norm(k));
      });
    });
    const missing = [...missingSet];
    // F班：愛迪生13:00前可備料、Ginny晚上煮 → 標註請愛迪生先備料
    const needPrep = sched[i].shift === "F";
    const lunch = prevDinner ? prevDinner + "（前晚打包）" : "前一週剩菜或自理";
    days.push({ day:CN[i], lunch, dinner, portions:sh.portions, together:sh.together, maxDiff, needPrep, missing });
    prevDinner = dinner;
  }
  return { days };
}

function Card({children,style}){return <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:16,...style}}>{children}</div>;}
function Label({children}){return <p style={{fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:C.muted,marginBottom:10}}>{children}</p>;}
function Btn({children,onClick,disabled,ghost,sm}){return <button onClick={onClick} disabled={disabled} style={{padding:sm?"6px 14px":"11px 18px",borderRadius:12,fontSize:sm?11:13,fontWeight:600,cursor:disabled?"not-allowed":"pointer",background:ghost?"transparent":disabled?"#d5ccc5":C.accent,color:ghost?C.accent:"#fff",border:ghost?"1.5px solid "+C.accent:"none",opacity:disabled?0.7:1}}>{children}</button>;}
function DayPill({date}){const h=getHol(date),w=isWknd(date);if(h)return <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:C.greenBg,color:C.green,fontWeight:600,marginLeft:5}}>{h}</span>;if(w)return <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:"#eceaf7",color:"#8884c0",marginLeft:5}}>週末</span>;return null;}
function StatsBox({receipts}){if(!receipts.length)return null;const tF=receipts.reduce((s,r)=>s+(r.foodTotal||0),0),tA=receipts.reduce((s,r)=>s+(r.grandTotal||0),0),av=Math.round(tF/receipts.length);return <Card><Label>花費統計</Label><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{[["累計食材","$"+tF.toLocaleString()],["累計總花費","$"+tA.toLocaleString()],["週均食材","$"+av.toLocaleString()]].map(([l,v])=><div key={l} style={{background:C.accentBg,borderRadius:12,padding:"10px 4px",textAlign:"center"}}><p style={{fontSize:14,fontWeight:600,color:C.accent}}>{v}</p><p style={{fontSize:10,color:C.muted,marginTop:2}}>{l}</p></div>)}</div></Card>;}

function App(){
  const [tab,setTab]=useState("food");
  const [ings,setIngs]=useState([]);
  const [ni,setNi]=useState({name:"",cat:"葉菜類",days:"",note:""});
  const [pantry,setPantry]=useState(PANTRY0);
  const [np,setNp]=useState("");
  const [ws,setWs]=useState(getMon);
  const [sched,setSched]=useState(()=>Array.from({length:7},(_,i)=>({i,shift:"D",me:"有空",note:""})));
  const [menu,setMenu]=useState(null);
  const [recipe,setRecipe]=useState(null);
  const [hist,setHist]=useState([]);
  const [deals,setDeals]=useState([]);
  const [nd,setNd]=useState("");
  const [shopRec,setShopRec]=useState(null);
  const [rcpts,setRcpts]=useState([]);
  const [nr,setNr]=useState({name:"",price:"",food:true});
  const fruits=getFruits();

  useEffect(()=>{try{const h=localStorage.getItem("h");if(h)setHist(JSON.parse(h));const ig=localStorage.getItem("ig");if(ig)setIngs(JSON.parse(ig));const pa=localStorage.getItem("pa");if(pa)setPantry(JSON.parse(pa));const rc=localStorage.getItem("rc");if(rc)setRcpts(JSON.parse(rc));}catch(e){}},[]);
  const saveI=l=>{setIngs(l);try{localStorage.setItem("ig",JSON.stringify(l))}catch(e){}};
  const saveP=l=>{setPantry(l);try{localStorage.setItem("pa",JSON.stringify(l))}catch(e){}};
  const saveR=l=>{setRcpts(l);try{localStorage.setItem("rc",JSON.stringify(l))}catch(e){}};
  const saveH=m=>{const h=[{date:new Date().toLocaleDateString("zh-TW"),menu:m},...hist].slice(0,4);setHist(h);try{localStorage.setItem("h",JSON.stringify(h))}catch(e){}};

  const sorted=[...ings].sort((a,b)=>a.days-b.days);
  const addIng=()=>{if(!ni.name.trim())return;const days=parseInt(ni.days)||CATS[ni.cat]||5;saveI([...ings,{...ni,days,id:Date.now()}]);setNi({name:"",cat:"葉菜類",days:"",note:""});};

  const genMenu=()=>{
    if(!ings.length){alert("請先輸入本週食材！");return;}
    // 自動從歷史菜單抓最近吃過的菜色（最近2週）避免重複
    const recentSet=new Set();
    hist.slice(0,2).forEach(h=>{
      (h.menu&&h.menu.days||[]).forEach(d=>{
        (d.dinner||"").split(/[＋+、，,]/).forEach(x=>{const c=x.trim();if(c&&c!=="白飯")recentSet.add(c);});
      });
    });
    const result=buildMenu(ings,sched,recentSet,pantry);
    setMenu(result);saveH(result);setTab("menu");
  };

  const getRecipe=(dish)=>{
    const clean=dish.replace(/（.*?）/g,"").replace(/白飯/,"").trim();
    if(DB[clean])setRecipe({dish:clean,...DB[clean]});
    else setRecipe({dish:clean,noData:true});
  };

  const genShopRec=()=>{
    let pool=[];
    if(deals.length){
      deals.forEach(d=>{
        Object.keys(DB).forEach(dish=>{
          if(DB[dish].keys.some(k=>d.includes(k)||k.includes(d))&&!pool.includes(dish))pool.push(dish);
        });
      });
    }
    const all=Object.keys(DB).filter(d=>DB[d].type==="main"||DB[d].type==="one");
    while(pool.length<6){const c=pick(all);if(!pool.includes(c))pool.push(c);}
    setShopRec(pool.slice(0,8));
  };

  const addReceipt=()=>{
    if(!nr.name.trim()||!nr.price)return;
    const ex=rcpts[0]&&rcpts[0].draft?rcpts[0]:null;
    const item={name:nr.name.trim(),price:parseInt(nr.price)||0,isFood:nr.food};
    if(ex){const items=[...ex.items,item];const foodTotal=items.filter(x=>x.isFood).reduce((s,x)=>s+x.price,0);const grandTotal=items.reduce((s,x)=>s+x.price,0);saveR([{...ex,items,foodTotal,grandTotal},...rcpts.slice(1)]);}
    else{const foodTotal=nr.food?item.price:0;saveR([{draft:true,id:Date.now(),date:new Date().toLocaleDateString("zh-TW"),items:[item],foodTotal,grandTotal:item.price},...rcpts]);}
    setNr({name:"",price:"",food:true});
  };
  const finishReceipt=()=>{if(rcpts[0]&&rcpts[0].draft)saveR([{...rcpts[0],draft:false},...rcpts.slice(1)]);};

  const TABS=[{id:"food",l:"食材"},{id:"sched",l:"行程"},{id:"menu",l:"菜單"},{id:"shop",l:"買菜"},{id:"hist",l:"歷史"},{id:"rcpt",l:"花費"}];

  return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Noto Serif TC','Noto Sans TC',serif"}}>
      <div style={{background:C.card,borderBottom:"1px solid "+C.border,padding:"22px 18px 14px"}}>
        <h1 style={{fontSize:22,fontWeight:300,letterSpacing:"0.2em",color:C.text,margin:0}}>一週菜單</h1>
        <p style={{fontSize:11,color:C.muted,marginTop:3,letterSpacing:"0.08em"}}>為 Ginny 與愛迪生規劃</p>
      </div>
      <div style={{display:"flex",background:C.card,borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:10}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"11px 2px",fontSize:11,fontWeight:tab===t.id?700:400,color:tab===t.id?C.accent:C.muted,background:"transparent",border:"none",borderBottom:tab===t.id?"2px solid "+C.accent:"2px solid transparent",cursor:"pointer"}}>{t.l}</button>)}
      </div>

      <div style={{maxWidth:520,margin:"0 auto",padding:"14px 12px",display:"flex",flexDirection:"column",gap:12}}>

        {tab==="food"&&<>
          <Card>
            <Label>新增食材</Label>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              <input value={ni.name} onChange={e=>setNi(n=>({...n,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addIng()} placeholder="食材名稱（按 Enter 快速新增）" style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:12,padding:"10px 14px",fontSize:13,color:C.text,outline:"none",boxSizing:"border-box"}} />
              <div style={{display:"flex",gap:8}}>
                <select value={ni.cat} onChange={e=>setNi(n=>({...n,cat:e.target.value}))} style={{flex:1,background:C.bg,border:"1px solid "+C.border,borderRadius:12,padding:"10px 14px",fontSize:13,color:C.text,outline:"none"}}>{Object.keys(CATS).map(c=><option key={c}>{c}</option>)}</select>
                <input value={ni.days} onChange={e=>setNi(n=>({...n,days:e.target.value}))} placeholder={"效期(預設"+CATS[ni.cat]+"天)"} type="number" style={{width:130,background:C.bg,border:"1px solid "+C.border,borderRadius:12,padding:"10px 14px",fontSize:13,color:C.text,outline:"none"}} />
              </div>
              <input value={ni.note} onChange={e=>setNi(n=>({...n,note:e.target.value}))} placeholder="備註（選填）" style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:12,padding:"10px 14px",fontSize:13,color:C.text,outline:"none",boxSizing:"border-box"}} />
              <Btn onClick={addIng}>＋ 加入食材</Btn>
            </div>
          </Card>
          {sorted.length>0&&<Card>
            <Label>本週食材 · {sorted.length} 項</Label>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {sorted.map(g=><div key={g.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderRadius:12,padding:"9px 13px",background:g.days<=2?"#faeaea":g.days<=4?C.accentBg:C.bg}}>
                <div><span style={{fontSize:13,fontWeight:500,color:C.text}}>{g.name}</span><span style={{fontSize:11,color:C.muted,marginLeft:7}}>{g.cat}</span>{g.note&&<span style={{fontSize:11,color:C.muted,marginLeft:4}}>· {g.note}</span>}<div style={{fontSize:11,marginTop:2,color:g.days<=2?C.red:C.muted}}>{g.days<=2?"⚠ 優先使用":"剩 "+g.days+" 天"}</div></div>
                <button onClick={()=>saveI(ings.filter(i=>i.id!==g.id))} style={{fontSize:18,color:C.muted,background:"none",border:"none",cursor:"pointer",paddingLeft:10}}>×</button>
              </div>)}
            </div>
          </Card>}
          <Card>
            <Label>常備調味料</Label>
            <p style={{fontSize:11,color:C.muted,marginBottom:10}}>家中已有，不需採買</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>{pantry.map(item=><span key={item} style={{display:"inline-flex",alignItems:"center",gap:3,padding:"4px 9px",borderRadius:99,fontSize:11,background:C.accentBg,color:C.accent}}>{item}<button onClick={()=>saveP(pantry.filter(p=>p!==item))} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:13,padding:0,opacity:0.6}}>×</button></span>)}</div>
            <div style={{display:"flex",gap:8}}>
              <input value={np} onChange={e=>setNp(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&np.trim()){saveP([...pantry,np.trim()]);setNp("");}}} placeholder="新增調味料" style={{flex:1,background:C.bg,border:"1px solid "+C.border,borderRadius:12,padding:"9px 13px",fontSize:13,color:C.text,outline:"none"}} />
              <Btn sm onClick={()=>{if(np.trim()){saveP([...pantry,np.trim()]);setNp("");}}}>＋</Btn>
            </div>
          </Card>
          <div style={{fontSize:11,color:C.muted,textAlign:"center",padding:"4px 0"}}>系統會自動記住最近的菜單，生成新菜單時避免重複。</div>
        </>}

        {tab==="sched"&&<>
          <Card>
            <Label>週別選擇</Label>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setWs(addD(ws,-7))} style={{width:36,height:36,borderRadius:10,border:"1px solid "+C.border,background:C.bg,color:C.muted,cursor:"pointer",fontSize:18}}>‹</button>
              <div style={{flex:1,textAlign:"center",fontSize:13,fontWeight:500,color:C.text}}>{(ws.getMonth()+1)}/{ws.getDate()} — {(addD(ws,6).getMonth()+1)}/{addD(ws,6).getDate()}</div>
              <button onClick={()=>setWs(addD(ws,7))} style={{width:36,height:36,borderRadius:10,border:"1px solid "+C.border,background:C.bg,color:C.muted,cursor:"pointer",fontSize:18}}>›</button>
              <Btn sm onClick={()=>setWs(getMon())}>本週</Btn>
            </div>
          </Card>
          <Card>
            <Label>班別說明</Label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{SK.map(k=>{const s=SHIFTS[k];return <div key={k} style={{borderRadius:8,padding:"5px 9px",background:s.color,fontSize:11}}><span style={{fontWeight:600,color:C.text}}>{s.label}</span> <span style={{color:C.muted}}>{s.time}·{s.portions}人</span></div>;})}</div>
          </Card>
          <Card>
            <Label>本週行程</Label>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {sched.map((s,i)=>{const d=addD(ws,i);const sh=SHIFTS[s.shift];return <div key={i} style={{borderRadius:14,padding:13,background:C.bg,border:"1px solid "+C.border}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:9}}>
                  <div style={{display:"flex",alignItems:"center",flexWrap:"wrap"}}><span style={{fontSize:13,fontWeight:500,color:C.text}}>{(d.getMonth()+1)}/{d.getDate()}（{WD[d.getDay()]}）</span><DayPill date={d} /></div>
                  <span style={{fontSize:11,padding:"2px 9px",borderRadius:99,background:sh.color,color:C.text}}>{sh.label}</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>{SK.map(k=><button key={k} onClick={()=>setSched(sc=>sc.map((x,j)=>j===i?{...x,shift:k}:x))} style={{padding:"5px 13px",borderRadius:10,fontSize:12,fontWeight:500,cursor:"pointer",border:"none",background:s.shift===k?C.accent:SHIFTS[k].color,color:s.shift===k?"#fff":C.text}}>{k}</button>)}</div>
                <p style={{fontSize:10,color:C.muted,marginBottom:7}}>{sh.desc}</p>
                <div style={{display:"flex",gap:7}}>
                  <select value={s.me} onChange={e=>setSched(sc=>sc.map((x,j)=>j===i?{...x,me:e.target.value}:x))} style={{flex:1,background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:"7px 11px",fontSize:12,color:C.text,outline:"none"}}><option>Ginny有空</option><option>Ginny普通</option><option>Ginny很忙</option></select>
                  <input value={s.note} onChange={e=>setSched(sc=>sc.map((x,j)=>j===i?{...x,note:e.target.value}:x))} placeholder="備註" style={{flex:1,background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:"7px 11px",fontSize:12,color:C.text,outline:"none"}} />
                </div>
              </div>;})}
            </div>
            <div style={{marginTop:12}}><Btn onClick={genMenu}>生成本週菜單</Btn></div>
          </Card>
        </>}

        {tab==="menu"&&<>
          {!menu&&<div style={{textAlign:"center",padding:"50px 0"}}><p style={{fontSize:36,marginBottom:10}}>🍱</p><p style={{fontSize:13,color:C.muted,marginBottom:16}}>請先填好食材與行程</p><Btn onClick={()=>setTab("food")}>前往填寫食材</Btn></div>}
          {menu&&<>
            <div style={{borderRadius:14,padding:"11px 15px",fontSize:12,background:C.accentBg,color:C.accent}}>優先使用 Ginny 輸入的食材（快過期的先用），每道菜都可點開看食譜。</div>
            {(menu.days||[]).map((d,i)=>{const sh=SHIFTS[sched[i]&&sched[i].shift]||SHIFTS.D;const dd=addD(ws,i);const ld=(d.lunch||"").replace(/（.*?）/g,"").split(/[＋+、，,]/).map(x=>x.trim()).filter(x=>x&&x!=="白飯");const dn=(d.dinner||"").split(/[＋+、，,]/).map(x=>x.trim()).filter(x=>x&&x!=="白飯");const dl=d.maxDiff||1;const diffLbl=dl===1?"簡易":dl===2?"普通":"較費工";const diffBg=dl===1?C.greenBg:dl===2?C.accentBg:"#f5e6e0";const diffCo=dl===1?C.green:dl===2?C.accent:C.red;const userNames=ings.map(x=>x.name);const SYN={"蕃茄":"番茄","白花椰":"花椰菜","青花菜":"花椰菜","綠花椰":"花椰菜","五花":"豬肉","肉片":"豬肉","肉絲":"豬肉","絞肉":"豬肉","里肌":"豬肉"};const norm=k=>SYN[k]||k;const missing=[];dn.forEach(dish=>{const r=DB[dish];if(!r)return;r.keys.forEach(k=>{const nk=norm(k);const have=userNames.some(u=>u.includes(nk)||nk.includes(u)||u.includes(k)||k.includes(u))||pantry.some(p=>p.includes(nk)||nk.includes(p));if(!have&&!missing.includes(nk))missing.push(nk);});});return <Card key={i}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",flexWrap:"wrap"}}><span style={{fontWeight:600,fontSize:14,color:C.text}}>{"（"+CN[i]+"）"}</span><span style={{fontSize:11,color:C.muted,marginLeft:7}}>{(dd.getMonth()+1)}/{dd.getDate()}（{WD[dd.getDay()]}）</span><DayPill date={dd} /></div>
                <span style={{fontSize:11,padding:"2px 9px",borderRadius:99,background:sh.color,color:C.text}}>{sh.label}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:9}}>
                <span style={{fontSize:11,borderRadius:9,padding:"4px 9px",background:sh.color,color:C.muted}}>{sh.together?"👫 一起吃":"🙋 各自吃"} · 煮 {sh.portions} 人份</span>
                <span style={{fontSize:11,borderRadius:9,padding:"4px 9px",background:diffBg,color:diffCo,fontWeight:600}}>{"◆".repeat(dl)} {diffLbl}</span>
                {d.needPrep&&<span style={{fontSize:11,borderRadius:9,padding:"4px 9px",background:"#fdf0e0",color:"#b8860b",fontWeight:600}}>🔪 請愛迪生先備料</span>}
              </div>
              <div style={{borderRadius:12,padding:11,marginBottom:8,background:C.bg}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}><span style={{fontSize:11,color:C.muted}}>午餐</span><span style={{fontSize:10,padding:"1px 7px",borderRadius:99,background:C.accentBg,color:C.accent}}>便當</span></div>
                <p style={{fontSize:13,color:C.text,marginBottom:7}}>{d.lunch}</p>
                <div>{ld.map(x=><button key={x} onClick={()=>getRecipe(x)} style={{fontSize:11,padding:"3px 9px",borderRadius:99,background:C.accentBg,color:C.accent,border:"1px solid "+C.border,cursor:"pointer",margin:"2px 3px 2px 0"}}>📖 {x}</button>)}</div>
              </div>
              <div style={{borderRadius:12,padding:11,background:C.greenBg}}>
                <p style={{fontSize:11,color:C.muted,marginBottom:5}}>晚餐 → 打包隔天便當</p>
                <p style={{fontSize:13,color:C.text,marginBottom:7}}>{d.dinner}</p>
                <div>{dn.map(x=><button key={x} onClick={()=>getRecipe(x)} style={{fontSize:11,padding:"3px 9px",borderRadius:99,background:"#deeede",color:C.green,border:"1px solid #c8e0c8",cursor:"pointer",margin:"2px 3px 2px 0"}}>📖 {x}</button>)}</div>
              </div>
              {missing.length>0&&<div style={{marginTop:9,borderRadius:10,padding:"8px 11px",background:"#fcebea",border:"1px dashed "+C.red}}>
                <p style={{fontSize:11,color:C.red,fontWeight:600,marginBottom:5}}>🛒 需補買食材</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{missing.map((m,mi)=><span key={mi} style={{fontSize:11,padding:"2px 8px",borderRadius:99,background:"#fff",color:C.red,border:"1px solid "+C.red}}>{m}</span>)}</div>
              </div>}
            </Card>;})}
            <Btn onClick={genMenu}>🔄 重新生成（換一批菜色）</Btn>
          </>}
        </>}

        {tab==="shop"&&<>
          <Card>
            <Label>本週特價食材</Label>
            <p style={{fontSize:11,color:C.muted,marginBottom:10}}>看完全聯傳單後輸入，下方推薦能用到的菜色</p>
            <div style={{display:"flex",gap:7,marginBottom:9}}>
              <input value={nd} onChange={e=>setNd(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&nd.trim()){setDeals(d=>[...d,nd.trim()]);setNd("");}}} placeholder="例：豬肉、高麗菜、蝦仁" style={{flex:1,background:C.bg,border:"1px solid "+C.border,borderRadius:12,padding:"9px 13px",fontSize:13,color:C.text,outline:"none"}} />
              <Btn sm onClick={()=>{if(nd.trim()){setDeals(d=>[...d,nd.trim()]);setNd("");}}}>＋</Btn>
            </div>
            {deals.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5}}>{deals.map((dl,i)=><span key={i} style={{display:"inline-flex",alignItems:"center",gap:3,padding:"4px 9px",borderRadius:99,fontSize:11,background:C.accentBg,color:C.accent}}>{dl}<button onClick={()=>setDeals(d=>d.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",opacity:0.6}}>×</button></span>)}</div>}
          </Card>
          <Card>
            <Label>當季水果參考</Label>
            <p style={{fontSize:11,color:C.muted,marginBottom:10}}>前後一個月當季 · ★ 本月盛產 · 粗體為常買</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{fruits.map(f=><span key={f.name} style={{display:"inline-block",padding:"5px 11px",borderRadius:99,fontSize:12,background:f.peak?C.greenBg:C.bg,color:f.peak?C.green:C.muted,border:"1px solid "+(f.peak?"#c8e0c8":C.border),fontWeight:f.fav?700:400}}>{f.peak?"★ ":""}{f.name}</span>)}</div>
          </Card>
          <Card>
            <Label>推薦本週菜色</Label>
            <div style={{marginBottom:10}}><Btn onClick={genShopRec}>根據特價推薦菜色</Btn></div>
            {shopRec&&<><p style={{fontSize:11,color:C.muted,marginBottom:9}}>能用到特價食材的菜（點開看食譜）：</p><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{shopRec.map((d,i)=><button key={i} onClick={()=>getRecipe(d)} style={{fontSize:12,padding:"5px 11px",borderRadius:99,background:C.accentBg,color:C.accent,border:"1px solid "+C.border,cursor:"pointer"}}>📖 {d}</button>)}</div></>}
          </Card>
        </>}

        {tab==="hist"&&(hist.length===0?<div style={{textAlign:"center",padding:"50px 0"}}><p style={{fontSize:36,marginBottom:10}}>📋</p><p style={{fontSize:13,color:C.muted}}>尚無歷史記錄</p></div>:hist.map((h,hi)=><Card key={hi}><p style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:8}}>{h.date}</p>{(h.menu&&h.menu.days||[]).map((d,i)=><div key={i} style={{fontSize:12,color:C.muted,marginBottom:5}}><span style={{fontWeight:600,color:C.text}}>{"（"+CN[i]+"）"}</span>　午：{d.lunch}　晚：{d.dinner}</div>)}</Card>))}

        {tab==="rcpt"&&<>
          <Card>
            <Label>記錄花費</Label>
            <p style={{fontSize:11,color:C.muted,marginBottom:10}}>手動輸入發票品項，自動統計食材花費</p>
            <div style={{display:"flex",gap:7,marginBottom:8}}>
              <input value={nr.name} onChange={e=>setNr(n=>({...n,name:e.target.value}))} placeholder="品項名稱" style={{flex:2,background:C.bg,border:"1px solid "+C.border,borderRadius:12,padding:"9px 13px",fontSize:13,color:C.text,outline:"none"}} />
              <input value={nr.price} onChange={e=>setNr(n=>({...n,price:e.target.value}))} placeholder="金額" type="number" style={{flex:1,background:C.bg,border:"1px solid "+C.border,borderRadius:12,padding:"9px 13px",fontSize:13,color:C.text,outline:"none"}} />
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
              <button onClick={()=>setNr(n=>({...n,food:!n.food}))} style={{padding:"6px 14px",borderRadius:99,fontSize:12,fontWeight:600,cursor:"pointer",border:"none",background:nr.food?C.greenBg:C.bg,color:nr.food?C.green:C.muted}}>{nr.food?"🥦 食材":"非食材"}</button>
              <span style={{fontSize:11,color:C.muted}}>點擊切換分類</span>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={addReceipt}>＋ 加入品項</Btn>
              {rcpts[0]&&rcpts[0].draft&&<Btn ghost onClick={finishReceipt}>完成這張發票</Btn>}
            </div>
          </Card>
          <StatsBox receipts={rcpts.filter(r=>!r.draft)} />
          {rcpts.map(r=><Card key={r.id} style={r.draft?{border:"2px solid "+C.accent}:{}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
              <div><span style={{fontSize:13,fontWeight:500,color:C.text}}>{r.date}</span>{r.draft&&<span style={{fontSize:11,color:C.accent,marginLeft:7}}>編輯中</span>}</div>
              <button onClick={()=>saveR(rcpts.filter(x=>x.id!==r.id))} style={{fontSize:18,color:C.muted,background:"none",border:"none",cursor:"pointer"}}>×</button>
            </div>
            <div style={{display:"flex",gap:7,marginBottom:9}}>
              <div style={{flex:1,borderRadius:10,padding:8,textAlign:"center",background:C.greenBg}}><p style={{fontSize:14,fontWeight:600,color:C.green}}>${(r.foodTotal||0).toLocaleString()}</p><p style={{fontSize:10,color:C.muted}}>食材</p></div>
              <div style={{flex:1,borderRadius:10,padding:8,textAlign:"center",background:C.accentBg}}><p style={{fontSize:14,fontWeight:600,color:C.accent}}>${(r.grandTotal||0).toLocaleString()}</p><p style={{fontSize:10,color:C.muted}}>總計</p></div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:3}}>{(r.items||[]).map((item,ii)=><div key={ii} style={{display:"flex",justifyContent:"space-between",borderRadius:8,padding:"5px 11px",fontSize:12,background:item.isFood?C.greenBg:C.bg,color:item.isFood?C.text:C.muted}}><span>{item.isFood?"🥦 ":""}{item.name}</span><span>${(item.price||0).toLocaleString()}</span></div>)}</div>
          </Card>)}
        </>}

      </div>

      {recipe&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.28)",zIndex:50,display:"flex",alignItems:"flex-end"}} onClick={()=>setRecipe(null)}>
        <div style={{width:"100%",maxWidth:520,margin:"0 auto",borderRadius:"22px 22px 0 0",padding:20,maxHeight:"80vh",overflowY:"auto",background:C.card}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h3 style={{fontSize:16,fontWeight:600,color:C.text}}>{recipe.dish}</h3>
            <button onClick={()=>setRecipe(null)} style={{fontSize:20,color:C.muted,background:"none",border:"none",cursor:"pointer"}}>×</button>
          </div>
          {recipe.noData&&<p style={{fontSize:13,color:C.muted,padding:"10px 0"}}>這道菜暫無詳細食譜。基本做法：食材洗淨切好，熱油爆香蒜或蔥，下主料炒熟，以鹽、醬油調味即可。</p>}
          {recipe.ing&&<>
            <div style={{marginBottom:14}}><p style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:7,letterSpacing:"0.12em"}}>食材</p><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{recipe.ing.map((x,i)=><span key={i} style={{fontSize:11,padding:"4px 10px",borderRadius:99,background:C.accentBg,color:C.accent}}>{x}</span>)}</div></div>
            <div style={{marginBottom:14}}><p style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:7,letterSpacing:"0.12em"}}>步驟</p><ol style={{listStyle:"none",margin:0,padding:0,display:"flex",flexDirection:"column",gap:8}}>{recipe.steps.map((s,i)=><li key={i} style={{display:"flex",gap:9,fontSize:13,color:C.text}}><span style={{fontWeight:700,color:C.accent,flexShrink:0}}>{i+1}.</span><span>{s}</span></li>)}</ol></div>
            {recipe.tip&&<div style={{borderRadius:12,padding:"11px 14px",fontSize:12,background:C.greenBg,color:C.green}}>💡 {recipe.tip}</div>}
          </>}
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
